line-length = 100
target-version = "py310"

[lint]
select = ["E", "F", "W", "B"]
# E501: the single-file app has long Qt call chains; line length is advisory
ignore = ["E501"]

[lint.per-file-ignores]
# the floorplanner package aggregates submodules via star re-export; the
# top-level FloorPlanner.py is a compatibility shim over the package
"floorplanner/__init__.py" = ["F403", "F405", "E402"]
"FloorPlanner.py" = ["F403", "F405"]
# generator script defines big literal tables
"_gen_assets.py" = ["E501"]
# headless scripts must set QT_QPA_PLATFORM before importing PyQt6
"docs/*.py" = ["E402"]
"examples/make_examples.py" = ["E402"]
"_*.py" = ["E402"]
# conftest / benchmark set the Qt platform + QApplication before importing
"tests/conftest.py" = ["E402"]
"tests/bench_rooms.py" = ["E402"]
