[pytest]
testpaths = tests
addopts = -ra

# Test categories. Tag a whole module with `pytestmark = pytest.mark.<name>`
# or a single test with `@pytest.mark.<name>`. Run/skip subsets with -m,
# e.g.  pytest -m geometry      pytest -m "not gui"      pytest -m "groups or io"
# or use the convenience flag  pytest --quick  (skips slow + gui).
markers =
    smoke: fast sanity checks (module imports, app builds, canvas)
    geometry: pure geometry / parsing helpers (no Qt scene needed)
    walls: wall + opening geometry and sizing
    rooms: room detection, area, inventory, naming
    selection: rubber-band enclosure selection + room-edge synthesis
    furnishings: furnishing catalog + true-scale placement
    groups: group / move / ungroup behaviour
    io: JSON and CSV import/export round-trips
    gui: drives synthetic mouse events through the view (slower)
    slow: long-running tests
