name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  # a new push to the same branch cancels the previous, still-running check
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install ruff
      - run: python -m ruff check .

  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.10 is the floor declared in pyproject.toml; 3.13 is what we develop on
        python-version: ["3.10", "3.13"]
    env:
      # the suite is headless; conftest also sets this, but be explicit for CI
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Qt runtime libraries
        # PyQt6 wheels ship Qt itself but still dlopen these system libs, even
        # under the offscreen platform plugin.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libdbus-1-3 \
            libxkbcommon0 libxkbcommon-x11-0 libfontconfig1 libfreetype6
          # glib was renamed libglib2.0-0 -> libglib2.0-0t64 in Ubuntu 24.04
          sudo apt-get install -y --no-install-recommends libglib2.0-0t64 \
            || sudo apt-get install -y --no-install-recommends libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -ra
